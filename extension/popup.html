<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      background-color: #0c0a0f;
      color: #fafafa;
      padding: 16px;
      box-sizing: border-box;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #27272a;
      padding-bottom: 12px;
      margin-bottom: 16px;
    }
    .title {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.5px;
      color: #818cf8;
      margin: 0;
    }
    .status-badge {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 99px;
      background-color: #1c1917;
      color: #a8a29e;
    }
    .status-badge.critical {
      background-color: #fca5a5;
      color: #7f1d1d;
    }
    .status-badge.safe {
      background-color: #d1fae5;
      color: #065f46;
    }
    .score-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #18181b;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #27272a;
      margin-bottom: 16px;
    }
    .score-label {
      font-size: 11px;
      color: #a1a1aa;
    }
    .score-val {
      font-size: 24px;
      font-weight: 900;
      color: #fafafa;
    }
    .metrics {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }
    .metric-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #d4d4d8;
    }
    .metric-label {
      color: #a1a1aa;
    }
    .metric-val {
      font-weight: 600;
    }
    .action-btn {
      width: 100%;
      height: 36px;
      background: linear-gradient(90deg, #6366f1, #a855f7);
      border: none;
      color: white;
      font-weight: 600;
      font-size: 12px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 class="title">PRIVORA SHIELD</h1>
    <div id="statusBadge" class="status-badge">Checking...</div>
  </div>

  <div class="score-container">
    <div>
      <div class="score-label">Domain Safety Index</div>
      <div id="targetUrl" style="font-size: 10px; color: #a1a1aa; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 4px;">Analyzing host...</div>
    </div>
    <div id="scoreVal" class="score-val">--</div>
  </div>

  <div class="metrics">
    <div class="metric-row">
      <span class="metric-label">SSL Grade</span>
      <span id="sslGrade" class="metric-val">--</span>
    </div>
    <div class="metric-row">
      <span class="metric-label">Google Safe Browsing</span>
      <span id="safeBrowsing" class="metric-val">--</span>
    </div>
    <div class="metric-row">
      <span class="metric-label">Phishing Flag</span>
      <span id="phishingFlag" class="metric-val">--</span>
    </div>
  </div>

  <button id="scanBtn" class="action-btn">
    Re-Scan Domain
  </button>

  <script src="popup.js"></script>
</body>
</html>
