<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Privora Guard</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 320px;
      margin: 0;
      background-color: #09090B;
      color: #FAFAFA;
      padding: 16px;
      box-sizing: border-box;
    }
    
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-b: 1px solid #27272A;
      padding-bottom: 12px;
      margin-bottom: 16px;
    }
    
    .logo {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.025em;
      color: #6366F1;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .status-badge {
      font-size: 10px;
      background-color: rgba(99, 102, 241, 0.15);
      color: #6366F1;
      border: 1px solid rgba(99, 102, 241, 0.2);
      padding: 2px 8px;
      border-radius: 9999px;
      font-weight: bold;
    }
    
    .score-box {
      background: linear-gradient(135deg, #18181B 0%, #09090B 100%);
      border: 1px solid #27272A;
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }
    
    .score-value {
      font-size: 32px;
      font-weight: 900;
      color: #6366F1;
      margin: 4px 0;
    }
    
    .score-label {
      font-size: 10px;
      text-transform: uppercase;
      color: #A1A1AA;
      letter-spacing: 0.05em;
      font-weight: bold;
    }
    
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(39, 39, 42, 0.4);
    }
    
    .toggle-info h4 {
      margin: 0;
      font-size: 12px;
      font-weight: bold;
    }
    
    .toggle-info p {
      margin: 2px 0 0 0;
      font-size: 10px;
      color: #71717A;
    }
    
    /* Toggle switch CSS */
    .switch {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
    }
    
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #27272A;
      transition: .2s;
      border-radius: 20px;
    }
    
    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .2s;
      border-radius: 50%;
    }
    
    input:checked + .slider {
      background-color: #6366F1;
    }
    
    input:checked + .slider:before {
      transform: translateX(16px);
    }
    
    .site-status {
      margin-top: 16px;
      background-color: rgba(16, 185, 129, 0.05);
      border: 1px solid rgba(16, 185, 129, 0.1);
      border-radius: 12px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: #10B981;
      box-shadow: 0 0 8px #10B981;
    }
    
    .status-text {
      font-size: 10px;
      color: #10B981;
      font-weight: 500;
    }
    
    .footer-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 11px;
      color: #A1A1AA;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.15s;
    }
    
    .footer-link:hover {
      color: #FAFAFA;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg width="14" height="16" viewBox="0 0 14 16" fill="none" style="display:inline-block; vertical-align:middle;">
        <path d="M7 0L0 3V8C0 12.42 3 16 7 16C11 16 14 12.42 14 8V3L7 0Z" fill="#6366F1"/>
      </svg>
      privora
    </div>
    <div class="status-badge" id="envBadge">Shield Active</div>
  </div>

  <div class="score-box">
    <div class="score-label">Digital Privacy Index</div>
    <div class="score-value" id="privacyScore">85%</div>
    <div class="score-label" id="scoreRating" style="color: #10B981;">Secure</div>
  </div>

  <div class="toggle-row">
    <div class="toggle-info">
      <h4>Tracker Shield</h4>
      <p>Auto-blocks tracker scripts</p>
    </div>
    <label class="switch">
      <input type="checkbox" id="trackerToggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="toggle-row">
    <div class="toggle-info">
      <h4>Cookie Consent Autopilot</h4>
      <p>Auto-declines non-essential cookies</p>
    </div>
    <label class="switch">
      <input type="checkbox" id="cookieToggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="toggle-row">
    <div class="toggle-info">
      <h4>Anti-Fingerprint</h4>
      <p>Masks canvas and audio parameters</p>
    </div>
    <label class="switch">
      <input type="checkbox" id="fingerprintToggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="site-status">
    <div class="status-dot"></div>
    <div class="status-text" id="siteDetails">Scanning current domain...</div>
  </div>

  <a href="http://localhost:3000/dashboard" target="_blank" class="footer-link">Open Dashboard Overview ↗</a>

  <script src="popup.js"></script>
</body>
</html>
